<!DOCTYPE html>
<html>
<head>
  <title>Loans - Incredible Solutions Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold text-center mb-6">Apply for a Loan</h1>

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">

  <!-- Loan Calculator -->
  <input id="loanAmount" type="number" placeholder="Loan Amount" class="w-full p-3 border mb-2">
  <input id="loanMonths" type="number" placeholder="Months" class="w-full p-3 border mb-2">

  <button onclick="calcLoan()" class="bg-blue-600 text-white p-2 w-full rounded">
    Calculate
  </button>

  <p id="loanResult" class="mt-3 text-center font-semibold"></p>

  <!-- Loan Form -->
  <form id="loanForm"
        action="https://formsubmit.co/mashalerolva@gmail.com"
        method="POST"
        enctype="multipart/form-data"
        class="space-y-3 mt-6">

    <input type="text" name="Full Name" placeholder="Full Name" required class="w-full p-3 border rounded">

    <input type="tel" name="Phone" placeholder="Phone Number" required class="w-full p-3 border rounded">

    <input type="number" name="Loan Amount" placeholder="Loan Amount" required class="w-full p-3 border rounded">

    <select name="Employment Status" required class="w-full p-3 border rounded">
      <option value="">Employment Status</option>
      <option>Employed</option>
      <option>Self-employed</option>
      <option>Unemployed</option>
    </select>

    <label class="text-sm font-semibold">Upload Payslip</label>
    <input type="file" name="Payslip" required>

    <label class="text-sm font-semibold">Upload Bank Statement</label>
    <input type="file" name="Bank Statement" required>

    <!-- Hidden FormSubmit Settings -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_subject" value="New Loan Application - Incredible Lendings">
    <input type="hidden" name="_next" value="thankyou.html">

    <button type="submit" class="bg-green-600 text-white p-3 w-full rounded hover:bg-green-700 transition">
      Apply Now
    </button>

  </form>

</div>

<!-- WhatsApp Button -->
<a href="https://wa.me/27737555225"
   class="fixed bottom-5 right-5 bg-green-500 text-white p-4 rounded-full shadow-lg">
   💬
</a>

<!-- Scripts -->
<script>
// Loan calculator
function calcLoan() {
  let a = document.getElementById("loanAmount").value;
  let m = document.getElementById("loanMonths").value;

  if (!a || !m) {
    document.getElementById("loanResult").innerHTML = "Enter amount and months";
    return;
  }

  let total = a * 1.3;
  let monthly = total / m;

  document.getElementById("loanResult").innerHTML =
    "Total: R" + total.toFixed(2) +
    " | Monthly: R" + monthly.toFixed(2);
}

// Force redirect after submission (fixes FormSubmit issue)
document.getElementById("loanForm").addEventListener("submit", function() {

  alert("Application submitted successfully!");

  setTimeout(() => {
    window.location.href = "thankyou.html";
  }, 1000);

});
</script>

</body>
</html>
