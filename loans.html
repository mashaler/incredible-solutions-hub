<!DOCTYPE html>
<html>
<head>
  <title>Loans</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold text-center mb-6">Apply for a Loan</h1>

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">

<input id="loanAmount" type="number" placeholder="Loan Amount" class="w-full p-3 border mb-2">
<input id="loanMonths" type="number" placeholder="Months" class="w-full p-3 border mb-2">

<button onclick="calcLoan()" class="bg-blue-600 text-white p-2 w-full rounded">Calculate</button>

<p id="loanResult" class="mt-3"></p>

<form action="https://formsubmit.co/mashalerolva@gmail.com"
      method="POST"
      enctype="multipart/form-data"
      class="space-y-3 mt-4">

  <input type="text" name="Full Name" placeholder="Full Name" required class="w-full p-3 border">

  <input type="tel" name="Phone" placeholder="Phone" required class="w-full p-3 border">

  <input type="number" name="Loan Amount" placeholder="Loan Amount" required class="w-full p-3 border">

  <input type="hidden" name="_subject" value="New Loan Application - Incredible Lendings">

  <input type="file" name="Payslip" required>
  <input type="file" name="Bank Statement" required>

  <!-- Hidden settings -->
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_template" value="table">
<input type="hidden" name="_next" value="https://mashaler.github.io/incredible-solutions-hub/thankyou.html">

  <button type="submit" class="bg-green-600 text-white p-3 w-full">
    Apply
  </button>

</form>

</div>

<script>
function calcLoan() {
  let a = loanAmount.value;
  let m = loanMonths.value;

  let total = a * 1.3;
  let monthly = total / m;

  loanResult.innerHTML = "Total: R" + total + " | Monthly: R" + monthly;
}
</script>

</body>
</html>
